<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- 引入 Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary:      #0f172a; /* 深午夜藍：代表穩重、信任 */
      --primary-light:#1e293b;
      --accent:       #10b981; /* 翡翠綠：代表獲利、成長 */
      --secondary:    #b45309; /* 琥珀金：代表價值、專業 */
      --danger:       #ef4444; /* 警示紅 */
      --bg:           #f1f5f9; /* 淺灰藍背景 */
      --surface:      #ffffff;
      --text-main:    #1e293b;
      --text-muted:   #64748b;
      --border:       #e2e8f0;
      --radius:       12px;    /* 稍微縮小圓角，更顯俐落專業 */
      --shadow:       0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-lg:    0 10px 15px -3px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang TC', 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding-bottom: 40px;
      line-height: 1.5;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 1rem;
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-lg);
    }
    .header-content {
      max-width: 600px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
    .brand span { color: var(--accent); }

    .user-zone { display: flex; align-items: center; gap: 10px; }
    .btn-auth {
      padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.3);
      font-size: 0.8rem; font-weight: 600; cursor: pointer; background: transparent; color: white;
    }
    .btn-auth.login { background: var(--accent); border-color: var(--accent); color: var(--primary); }

    #auth-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
      display: none; align-items: center; justify-content: center; z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: white; padding: 2rem; border-radius: var(--radius);
      width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-content input {
      padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem;
    }
    .btn-submit {
      padding: 0.8rem; background: var(--primary); color: white; border: none;
      border-radius: 8px; font-weight: 700; cursor: pointer;
    }

    .filter-section { max-width: 600px; margin: 1.25rem auto; padding: 0 1rem; }
    .tab-box { background: #f1f5f9; padding: 4px; border-radius: 100px; display: flex; gap: 4px; margin-bottom: 1rem; }
    .tab-btn {
      padding: 6px 18px; border-radius: 100px; border: none; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; color: var(--text-muted); background: transparent; transition: 0.3s;
      display: flex; align-items: center; gap: 6px;
    }
    .tab-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .count-badge {
      font-size: 0.7rem; background: #e2e8f0; color: var(--text-muted); 
      padding: 2px 6px; border-radius: 10px; min-width: 20px;
    }
    .tab-btn.active .count-badge { background: var(--primary); color: white; }

    .list-info-bar {
      max-width: 600px; margin: 0.5rem auto 1rem; padding: 0 1rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
    }
    .stat-pill { background: white; padding: 4px 12px; border-radius: 100px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .stat-pill i { margin-right: 4px; color: var(--accent); }

    .filter-grid {
      background: var(--surface); padding: 1rem; border-radius: var(--radius);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .f-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .f-group label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
    .f-group input, .f-group select {
      padding: 0.6rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; 
    }
    .f-full { grid-column: 1 / -1; }

    .list { max-width: 600px; margin: 0 auto; padding: 0 1rem; display: grid; gap: 1rem; }
    .item {
      background: var(--surface); border-radius: var(--radius); padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      position: relative;
    }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .county-tag { background: #f1f5f9; color: var(--primary); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
    .roi-num { font-size: 1.6rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
    
    .addr-area { padding: 0.8rem; background: #f8fafc; border-radius: 12px; border: 1px solid #edf2f7; cursor: pointer; }
    .addr-main { font-weight: 800; font-size: 1rem; line-height: 1.4; }
    .area-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; font-weight: 600; }

    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .price-box { padding: 0.75rem; border-radius: 12px; background: #fff; border: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 2px; }
    .p-lbl { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; }
    .p-val { font-size: 1.1rem; font-weight: 900; }
    
    .btn-pdf { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 0.85rem; background: var(--primary); color: white; border-radius: 12px; text-decoration: none; font-size: 0.9rem; font-weight: 700; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; }
    .tag-handover { background: #dcfce7; color: #166534; }
    .tag-no-handover { background: #fee2e2; color: #991b1b; }
    .tag-empty { background: #dbeafe; color: #1e40af; }
    .tag-date { background: #fef3c7; color: #92400e; }

    .paywall-card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: white; padding: 2.5rem 1.5rem; border-radius: var(--radius);
      text-align: center; display: flex; flex-direction: column; gap: 1.25rem;
      margin: 1rem 0; border: 2px solid var(--secondary);
      box-shadow: 0 10px 25px rgba(217, 119, 6, 0.2);
    }
    .paywall-card h3 { color: var(--secondary); font-size: 1.4rem; }

    .skeleton { background: #e2e8f0; border-radius: 8px; animation: pulse 1.5s infinite ease-in-out; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    .sk-card { height: 200px; padding: 1.25rem; border-radius: var(--radius); background: #fff; display: flex; flex-direction: column; gap: 1rem; border: 1px solid var(--border); }
    .sk-line { height: 1.2rem; width: 100%; }

    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 10px 24px; border-radius: 100px; font-size: 0.85rem; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="brand">法拍補償 <span>PRO</span></div>
    <div class="user-zone" id="user-zone">
      <button class="btn-auth login" onclick="toggleModal(true)">登入</button>
    </div>
  </div>
</header>

<div id="auth-modal">
  <div class="modal-content">
    <h2 id="modal-title">會員登入</h2>
    <p id="modal-desc" style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem">登入以同步您的專業版權限</p>
    <input type="email" id="auth-email" placeholder="電子郵件">
    <input type="password" id="auth-password" placeholder="密碼">
    <button class="btn-submit" onclick="handleAuth()">確認</button>
    <div style="text-align:center; font-size: 0.85rem; color: var(--primary); font-weight:700; cursor:pointer; margin-top:0.5rem" id="auth-switch" onclick="switchAuthMode()">
      沒有帳號？立即註冊
    </div>
    <hr style="border:none; border-top:1px solid #f1f5f9; margin:1rem 0">
    <button class="btn-auth" style="border:none; color:var(--text-muted)" onclick="toggleModal(false)">取消</button>
  </div>
</div>

<section class="filter-section">
  <div class="tab-box">
    <button id="t-gen" class="tab-btn active" onclick="tab('general')">一般 <span class="count-badge">0</span></button>
    <button id="t-buy" class="tab-btn" onclick="tab('special')">應買 <span class="count-badge">0</span></button>
  </div>
  <div class="filter-grid">
    <div class="f-group">
      <label>縣市篩選</label>
      <select id="f-county" onchange="render()"><option value="ALL">全部縣市</option></select>
    </div>
    <div class="f-group">
      <label>排序方式</label>
      <select id="f-sort" onchange="render()">
        <option value="roiDesc">報酬率最高 ↓</option>
        <option value="priceAsc">底價最低 ↑</option>
      </select>
    </div>
    <div class="f-group f-full">
      <label>搜尋關鍵字</label>
      <input type="text" id="f-key" placeholder="輸入地址、路名..." oninput="debounceRender()">
    </div>
  </div>
</section>

<div class="list-info-bar">
  <div class="stat-pill" id="result-count"><i class="fa-solid fa-list-ul"></i> 正在載入...</div>
  <div style="font-size: 0.75rem; color: var(--text-muted);">
    <i class="fa-solid fa-clock-rotate-left"></i> 即時更新
  </div>
</div>

<section id="list" class="list"></section>
<div id="toast">已複製地址</div>

<script>
  const supabaseUrl = 'https://chppibzteoaukafnozmq.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNocHBpYnp0ZW9hdWthZm5vem1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTk5MzEsImV4cCI6MjA5MzE3NTkzMX0.wbj52Yx9_Xst0hOltaPbigBkkcBka30zdrkRXpxbtDo';
  
  let supabaseClient;
  try {
    supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
  } catch (e) {
    console.error("Supabase SDK 載入失敗:", e);
  }

  let rawData = { general: [], special: [] };
  let currentTab = 'general';
  let userRole = 'visitor';
  let isRestricted = true;
  let isSignUpMode = false;

  window.onload = async () => {
    await checkUser();
    await loadData();
  };

  async function checkUser() {
    try {
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (user) {
        const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', user.id).single();
        userRole = profile?.role || 'free';
        document.getElementById('user-zone').innerHTML = `
          <div style="text-align:right">
            <div style="font-size:0.7rem; font-weight:800; color:var(--accent)">${userRole.toUpperCase()} 會員</div>
            <div style="font-size:0.6rem; color:var(--text-muted); cursor:pointer" onclick="handleLogout()">登出帳號</div>
          </div>
        `;
      }
    } catch (e) { console.log("User check skipped"); }
  }

  async function loadData() {
    document.getElementById('list').innerHTML = Array(3).fill('<div class="sk-card"><div class="skeleton sk-line"></div><div class="skeleton sk-line" style="width:60%"></div></div>').join('');
    
    try {
      const { data, error } = await supabaseClient.rpc('get_auctions_by_role');
      if (error) throw error;

      isRestricted = userRole !== 'pro';
      rawData.general = preprocess(data.filter(item => !item.is_special_buy));
      rawData.special = preprocess(data.filter(item => item.is_special_buy));
      
      // 更新標籤數量
      document.getElementById('t-gen').querySelector('.count-badge').innerText = rawData.general.length;
      document.getElementById('t-buy').querySelector('.count-badge').innerText = rawData.special.length;

      initCounty();
      render();
    } catch (err) {
      console.error("Fetch error:", err);
      document.getElementById('list').innerHTML = `<div style="text-align:center; padding:2rem; color:var(--text-muted)">無法載入資料 (${err.message})。請確認已執行 RPC SQL 語法。</div>`;
    }
  }

  function preprocess(arr) {
    return arr.map(item => {
      let areaM2 = Number(item.area_m2) || 0;
      const comp = Number(item.estimated_comp) || Math.round(areaM2 * 6);
      const price = Number(item.base_price) || 0;
      const roi = Number(item.roi) || (price > 0 ? (comp / price * 100) : 0);
      return { ...item, areaM2, comp, roi, numPrice: price };
    });
  }

  function render() {
    const fCounty = document.getElementById('f-county').value;
    const fKey = document.getElementById('f-key').value.trim().toLowerCase();
    const fSort = document.getElementById('f-sort').value;

    let list = (rawData[currentTab] || []).filter(item => {
      if (fCounty !== 'ALL' && item.county !== fCounty) return false;
      if (fKey && !(item.address || '').toLowerCase().includes(fKey)) return false;
      return true;
    });

    list.sort((a, b) => fSort === 'roiDesc' ? b.roi - a.roi : a.numPrice - b.numPrice);

    // 更新搜尋結果數量
    document.getElementById('result-count').innerHTML = `<i class="fa-solid fa-list-ul"></i> 搜尋結果：${list.length} 筆`;

    const container = document.getElementById('list');
    if (list.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--text-muted)">尚無符合條件的標案</div>';
    } else {
      container.innerHTML = list.map(item => {
        const roiColor = item.roi >= 100 ? '#e11d48' : (item.roi >= 50 ? '#d97706' : '#64748b');
        return `
          <div class="item">
            <div class="card-top">
              <div class="county-tag">${item.county}</div>
              <div class="roi-badge">
                <span class="roi-num" style="color:${roiColor}">${item.roi.toFixed(1)}%</span>
                <div class="roi-lbl" style="color:${roiColor}">ROI 報酬率</div>
              </div>
            </div>
            <div style="font-size:0.75rem; font-weight:700; color:var(--text-muted)">${item.court_name || ''} ${item.sale_type || ''}</div>
            <div class="addr-area" onclick="copy('${item.address}')">
              <div class="addr-main">${item.address}</div>
              <div class="tags-row">
                <span class="tag ${item.is_handover ? 'tag-handover' : 'tag-no-handover'}">${item.is_handover ? '點交' : '不點交'}</span>
                ${item.is_empty_land ? '<span class="tag tag-empty">空地</span>' : ''}
                <span class="tag tag-date"><i class="fa-regular fa-calendar"></i> ${item.sale_date || '未定'}</span>
              </div>
              <div class="area-sub"><i class="fa-solid fa-ruler-combined"></i> ${item.area_display || ''}</div>
            </div>
            <div class="price-grid">
              <div class="price-box"><div class="p-lbl">拍賣底價</div><div class="p-val" style="color:var(--danger)">$${item.numPrice.toLocaleString()}</div></div>
              <div class="price-box"><div class="p-lbl">預估補償金</div><div class="p-val" style="color:var(--accent)">$${item.comp.toLocaleString()}</div></div>
            </div>
            ${item.pdf_url ? `<a href="${item.pdf_url}" target="_blank" class="btn-pdf">查看官方公告 <i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
          </div>
        `;
      }).join('');
    }
if (isRestricted) {
  let title = "🎲 發現更多高回報物件";
  let desc = `目前的 [訪客] 模式僅能隨機預覽 3 筆案件。請 [註冊/登入] 即可解鎖至隨機 10 筆預覽。`;

  if (userRole === 'free') {
    title = "💎 取得全台完整投資數據";
    desc = `您目前已登入 [普通會員]，可預覽 10 筆案件。升級專業版即可解鎖全台 150+ 筆完整案件與精確計算。`;
  }

  container.innerHTML += `
    <div class="paywall-card">
      <h3>${title}</h3>
      <p>${desc}</p>
      <div style="font-weight:800; color:var(--secondary)">請聯繫管理員開通專業版權限</div>
      <small style="opacity:0.8">掌握資訊領先權，精準投標獲利</small>
    </div>
  `;
}
  }

  function toggleModal(show) { document.getElementById('auth-modal').style.display = show ? 'flex' : 'none'; }
  function switchAuthMode() {
    isSignUpMode = !isSignUpMode;
    document.getElementById('modal-title').innerText = isSignUpMode ? '會員註冊' : '會員登入';
    document.getElementById('auth-switch').innerText = isSignUpMode ? '已有帳號？立即登入' : '沒有帳號？立即註冊';
    document.getElementById('modal-desc').innerText = isSignUpMode ? '註冊帳號以取得免費試用權限' : '登入以同步您的專業版權限';
  }
  async function handleAuth() {
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    if(!email || !password) return alert("請填寫完整資訊");
    
    try {
      const { error } = isSignUpMode 
        ? await supabaseClient.auth.signUp({ email, password })
        : await supabaseClient.auth.signInWithPassword({ email, password });
      
      if (error) throw error;
      
      if (isSignUpMode) {
        alert('註冊成功！請至信箱點擊驗證信後再登入');
        toggleModal(false); // 🔴 新增：註冊成功後關閉視窗
      } else {
        alert('登入成功');
        location.reload();
      }
    } catch (e) {
      alert("認證錯誤: " + e.message);
    }
  }
  async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }
  function copy(t) { navigator.clipboard.writeText(t); document.getElementById('toast').style.opacity = 1; setTimeout(()=>document.getElementById('toast').style.opacity=0, 2000); }
  function initCounty() {
    const all = [...rawData.general, ...rawData.special];
    const counties = [...new Set(all.map(d => d.county).filter(Boolean))].sort();
    const select = document.getElementById('f-county');
    select.innerHTML = '<option value="ALL">全部縣市</option>';
    counties.forEach(c => select.add(new Option(c, c)));
  }
  function tab(t) { currentTab = t; document.getElementById('t-gen').classList.toggle('active', t==='general'); document.getElementById('t-buy').classList.toggle('active', t==='special'); render(); }
  let renderTimer;
  function debounceRender() { clearTimeout(renderTimer); renderTimer = setTimeout(render, 300); }
</script>
</body>
</html>
