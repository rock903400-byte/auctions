<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- 引入 Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary:      #0f172a; /* 深邃藍黑 */
      --primary-light:#1e293b;
      --accent:       #059669; /* 翡翠綠 */
      --secondary:    #d97706; /* 琥珀橘 */
      --danger:       #e11d48; /* 玫瑰紅 */
      --bg:           #f8fafc; /* 極輕灰藍 */
      --surface:      #ffffff;
      --text-main:    #0f172a;
      --text-muted:   #64748b;
      --border:       #f1f5f9;
      --radius:       16px;
      --shadow:       0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      --shadow-lg:    0 10px 15px -3px rgb(0 0 0 / 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'PingFang TC', 'Microsoft JhengHei', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      padding-bottom: 40px;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* ── Header: 毛玻璃質感 ── */
    header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky; top: 0; z-index: 100;
    }
    .header-content {
      max-width: 600px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .brand { font-size: 1.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

    /* ── Tab: 膠囊設計 ── */
    .tab-box { background: #f1f5f9; padding: 4px; border-radius: 100px; display: flex; gap: 4px; }
    .tab-btn {
      padding: 6px 18px; border-radius: 100px; border: none; font-size: 0.85rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); color: var(--text-muted); background: transparent;
    }
    .tab-btn.active { background: var(--surface); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

    /* ── Filter ── */
    .filter-section { max-width: 600px; margin: 1.25rem auto; padding: 0 1rem; }
    .filter-grid {
      background: var(--surface); padding: 1rem; border-radius: var(--radius);
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .f-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .f-group label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; padding-left: 2px; }
    .f-group input, .f-group select {
      padding: 0.6rem 0.75rem; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; 
      outline: none; background: #fff; transition: border-color 0.2s; color: var(--text-main);
    }
    .f-group input:focus { border-color: var(--secondary); }
    .f-full { grid-column: 1 / -1; }
    .update-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 8px; text-align: right; opacity: 0.8; }

    /* ── List & Cards ── */
    .list { max-width: 600px; margin: 0 auto; padding: 0 1rem; display: grid; gap: 1rem; }
    .item {
      background: var(--surface); border-radius: var(--radius); padding: 1.25rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .item:active { transform: scale(0.98); }

    /* 卡片裝飾條 */
    .item::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
      background: var(--accent);
    }
    .item-special::before { background: var(--secondary); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .county-tag {
      background: #f1f5f9; color: var(--primary); padding: 4px 10px; 
      border-radius: 6px; font-size: 0.75rem; font-weight: 800;
    }
    
    .roi-badge { text-align: right; }
    .roi-num { font-size: 1.5rem; font-weight: 900; line-height: 1; letter-spacing: -1px; }
    .roi-txt { font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }

    .court-info { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-bottom: 2px; }

    /* 地址區域 */
    .addr-area { 
      padding: 0.8rem; background: #f8fafc; border-radius: 12px; border: 1px solid #edf2f7;
      cursor: pointer; position: relative; transition: background 0.2s;
    }
    .addr-area:hover { background: #f1f5f9; }
    .addr-main { font-weight: 800; font-size: 1rem; line-height: 1.4; color: var(--text-main); padding-right: 24px; }
    .area-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .copy-icon { position: absolute; right: 12px; top: 14px; font-size: 0.8rem; color: #cbd5e1; }

    /* ── Tags & Badges ── */
    .tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag {
      font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px;
      display: flex; align-items: center; gap: 4px;
    }
    .tag-handover { background: #dcfce7; color: #166534; } 
    .tag-no-handover { background: #fee2e2; color: #991b1b; }
    .tag-empty { background: #dbeafe; color: #1e40af; }
    .tag-date { background: #fef3c7; color: #92400e; }
    .tag-case { background: #f1f5f9; color: var(--text-muted); font-family: monospace; }

    /* 價格數據 */
    .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .price-box { 
      padding: 0.75rem; border-radius: 12px; background: #fff; border: 1px solid #f1f5f9;
      display: flex; flex-direction: column; gap: 2px;
    }
    .p-lbl { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .p-val { font-size: 1.1rem; font-weight: 900; }

    /* 按鈕 */
    .btn-pdf {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 0.85rem; background: var(--primary); color: white;
      border-radius: 12px; text-decoration: none; font-size: 0.9rem; font-weight: 700;
      transition: background 0.2s;
    }
    .btn-pdf:hover { background: var(--primary-light); }
    .btn-pdf i { font-size: 0.8rem; opacity: 0.8; }

    /* ── Skeleton Loading ── */
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
    .skeleton { background: #e2e8f0; border-radius: 8px; animation: pulse 1.5s infinite ease-in-out; }
    .sk-card { height: 200px; padding: 1.25rem; border-radius: var(--radius); background: #fff; display: flex; flex-direction: column; gap: 1rem; }
    .sk-line { height: 1.2rem; width: 100%; }
    .sk-tag { height: 1.5rem; width: 60px; }
    .sk-price { height: 3rem; width: 100%; }

    /* Toast */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--primary); color: white; padding: 10px 24px; border-radius: 100px;
      font-size: 0.85rem; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 1000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2); pointer-events: none;
    }

    .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; }

    /* 動畫 */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item { animation: fadeInUp 0.4s ease backwards; }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="brand">法拍補償 PRO</div>
    <div class="tab-box">
      <button id="t-gen" class="tab-btn active" onclick="tab('general')">一般</button>
      <button id="t-buy" class="tab-btn" onclick="tab('special')">應買</button>
    </div>
  </div>
</header>

<section class="filter-section">
  <div class="filter-grid">
    <div class="f-group">
      <label><i class="fa-solid fa-map-location-dot"></i> 縣市</label>
      <select id="f-county" onchange="render()"><option value="ALL">全部縣市</option></select>
    </div>
    <div class="f-group">
      <label><i class="fa-solid fa-sort"></i> 排序方式</label>
      <select id="f-sort" onchange="render()">
        <option value="roiDesc">報酬率最高 ↓</option>
        <option value="priceAsc">拍賣底價最低 ↑</option>
        <option value="areaDesc">土地面積最大 ↓</option>
      </select>
    </div>
    <div class="f-group f-full">
      <label><i class="fa-solid fa-magnifying-glass"></i> 搜尋</label>
      <input type="text" id="f-key" placeholder="輸入地址、地段關鍵字..." oninput="debounceRender()">
    </div>
  </div>
  <div class="update-time" id="u-time">最後更新：載入中...</div>
</section>

<section id="list" class="list"></section>
<div id="toast">已複製地址到剪貼簿</div>

<script>
  // 初始化 Supabase
  const supabaseUrl = 'https://chppibzteoaukafnozmq.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNocHBpYnp0ZW9hdWthZm5vem1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTk5MzEsImV4cCI6MjA5MzE3NTkzMX0.wbj52Yx9_Xst0hOltaPbigBkkcBka30zdrkRXpxbtDo';
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  let rawData = { general: [], special: [] };
  let currentTab = 'general';
  let renderTimer;

  window.onload = async () => {
    // 顯示骨架屏
    const skeletonHtml = Array(3).fill(`
      <div class="sk-card">
        <div style="display:flex; justify-content:space-between">
          <div class="skeleton sk-tag"></div>
          <div class="skeleton sk-tag" style="width:80px"></div>
        </div>
        <div class="skeleton sk-line" style="height:2rem"></div>
        <div class="skeleton sk-line"></div>
        <div class="price-grid">
          <div class="skeleton sk-price"></div>
          <div class="skeleton sk-price"></div>
        </div>
      </div>
    `).join('');
    document.getElementById('list').innerHTML = skeletonHtml;
    
    try {
      const { data, error } = await supabaseClient
        .from('auctions')
        .select('*');

      if (error) throw error;

      const generalData = data.filter(item => !item.is_special_buy);
      const specialData = data.filter(item => item.is_special_buy);

      rawData.general = preprocess(generalData);
      rawData.special = preprocess(specialData);
      
      if (data.length > 0 && data[0].created_at) {
         const date = new Date(data[0].created_at);
         document.getElementById('u-time').innerText = '最後更新：' + date.toLocaleString('zh-TW');
      } else {
         document.getElementById('u-time').innerText = '最後更新：剛剛';
      }
      
      initCounty();
      render();

    } catch (err) {
      console.error('Fetch data error:', err);
      document.getElementById('list').innerHTML = '<div class="empty-state">無法載入資料，請重新整理頁面。</div>';
    }
  };

  function preprocess(arr) {
    return arr.map(item => {
      let areaM2 = Number(item.area_m2) || 0;
      let areaDisplay = item.area_display || '';
      if (areaM2 === 0 && areaDisplay) {
         const m = areaDisplay.match(/\(([\d\.]+)\s*平方公尺\)/);
         if (m) areaM2 = parseFloat(m[1]);
      }
      const price = Number(item.base_price) || 0;
      const comp = Number(item.estimated_comp) || Math.round(areaM2 * 6);
      const roi = Number(item.roi) || (price > 0 ? (comp / price * 100) : 0);
      
      return { 
        ...item, 
        areaM2, 
        comp, 
        roi,
        numPrice: price,
        areaDisplay: areaDisplay.split('\n')[0] || '未知面積'
      };
    });
  }

  function initCounty() {
    const all = [...rawData.general, ...rawData.special];
    const counties = [...new Set(all.map(d => d.county).filter(Boolean))].sort();
    const select = document.getElementById('f-county');
    select.innerHTML = '<option value="ALL">全部縣市</option>';
    counties.forEach(c => select.add(new Option(c, c)));
  }

  function tab(t) {
    currentTab = t;
    document.getElementById('t-gen').classList.toggle('active', t === 'general');
    document.getElementById('t-buy').classList.toggle('active', t === 'special');
    render();
  }

  function debounceRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(render, 300);
  }

  function esc(s) {
    if (!s) return '';
    return s.toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function copy(text) {
    const showToast = () => {
      const toast = document.getElementById('toast');
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(-10px)';
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      }, 2000);
    };

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(showToast).catch(() => fallbackCopy(text, showToast));
    } else {
      fallbackCopy(text, showToast);
    }
  }

  function fallbackCopy(text, callback) {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.position = 'fixed';
    el.style.top = '-9999px';
    document.body.appendChild(el);
    el.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(el);
    if (callback) callback();
  }

  function render() {
    const fCounty = document.getElementById('f-county').value;
    const fKey    = document.getElementById('f-key').value.trim().toLowerCase();
    const fSort   = document.getElementById('f-sort').value;

    let list = (rawData[currentTab] || []).filter(item => {
      if (fCounty !== 'ALL' && item.county !== fCounty) return false;
      if (fKey && !(item.address || '').toLowerCase().includes(fKey)) return false;
      return true;
    });

    list.sort((a, b) => {
      if (fSort === 'roiDesc') return b.roi - a.roi;
      if (fSort === 'priceAsc') return a.numPrice - b.numPrice;
      if (fSort === 'areaDesc') return b.areaM2 - a.areaM2;
      return 0;
    });

    const container = document.getElementById('list');
    if (list.length === 0) {
      container.innerHTML = '<div class="empty-state">未找到符合條件的法拍物件</div>';
      return;
    }

    container.innerHTML = list.map((item, idx) => {
      let roiColor = '#64748b'; 
      let roiLabel = ''; 
      if (item.roi >= 100) { roiColor = '#e11d48'; roiLabel = '🔥 頂級回報'; }
      else if (item.roi >= 50) { roiColor = '#d97706'; roiLabel = '💎 高回報'; }

      const linkBtn = item.pdf_url 
        ? `<a href="${item.pdf_url}" target="_blank" class="btn-pdf">
             查看官方公告 <i class="fa-solid fa-arrow-up-right-from-square"></i>
           </a>`
        : `<div class="btn-pdf" style="background: #cbd5e1; cursor: not-allowed;">
             暫無公告連結
           </div>`;

      const handoverHtml = item.is_handover 
        ? `<span class="tag tag-handover"><i class="fa-solid fa-key"></i> 點交</span>`
        : `<span class="tag tag-no-handover"><i class="fa-solid fa-lock"></i> 不點交</span>`;
      
      const emptyLandHtml = item.is_empty_land
        ? `<span class="tag tag-empty"><i class="fa-solid fa-tree"></i> 空地</span>`
        : '';
      
      const saleDateHtml = item.sale_date
        ? `<span class="tag tag-date"><i class="fa-solid fa-calendar-days"></i> 拍賣日: ${item.sale_date}</span>`
        : '';

      const caseNoHtml = item.case_no
        ? `<span class="tag tag-case">${esc(item.case_no)}</span>`
        : '';

      return `
        <div class="item ${currentTab === 'special' ? 'item-special' : ''}" style="animation-delay: ${idx * 0.05}s">
          <div class="card-top">
            <div class="county-tag">${esc(item.county)}</div>
            <div class="roi-badge">
              <span class="roi-num" style="color:${roiColor}">${item.roi.toFixed(1)}%</span>
              ${roiLabel ? `<span class="roi-txt" style="background:${roiColor}15; color:${roiColor}">${roiLabel}</span>` : ''}
            </div>
          </div>

          <div class="court-info">${esc(item.court_name || '')} ${esc(item.sale_type || '')}</div>

          <div class="addr-area" onclick="copy('${esc(item.address)}')">
            <i class="fa-regular fa-copy copy-icon"></i>
            <div class="addr-main">${esc(item.address)}</div>
            <div class="tags-row">
              ${handoverHtml}
              ${emptyLandHtml}
              ${saleDateHtml}
              ${caseNoHtml}
            </div>
            <div class="area-sub" style="margin-top: 8px;"><i class="fa-solid fa-vector-square"></i> ${esc(item.areaDisplay)}</div>
          </div>

          <div class="price-grid">
            <div class="price-box">
              <div class="p-lbl"><i class="fa-solid fa-tag"></i> 拍賣底價</div>
              <div class="p-val" style="color:var(--danger)">$${item.numPrice.toLocaleString()}</div>
            </div>
            <div class="price-box">
              <div class="p-lbl"><i class="fa-solid fa-sack-dollar"></i> 估計補償</div>
              <div class="p-val" style="color:var(--accent)">$${item.comp.toLocaleString()}</div>
            </div>
          </div>

          ${linkBtn}
        </div>
      `;
    }).join('');
  }
</script>

</body>
</html>
